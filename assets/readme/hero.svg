<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="380" viewBox="0 0 1200 380"
     role="img" aria-labelledby="title desc">
  <title id="title">Kerala Pooram Management Portal (Pooram Connect)</title>
  <desc id="desc">Centrally manage temple festivals, elephant bookings, and traditional accessory inventory with a modern cultural design system.</desc>

  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#260B08" />
      <stop offset="100%" stop-color="#120403" />
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#FAF6ED" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
  </defs>

  <!-- Background Base -->
  <rect width="1200" height="380" rx="20" fill="url(#bg-gradient)" />

  <!-- Gold Border Frame -->
  <rect x="15" y="15" width="1170" height="350" rx="16" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.3" />

  <!-- Traditional Nettipattam-inspired Geometric Motif (Left Corner Decorative Circles) -->
  <g transform="translate(45, 45)" opacity="0.15">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#D4AF37" stroke-width="1" />
    <circle cx="0" cy="0" r="60" fill="none" stroke="#D4AF37" stroke-width="1" />
    <circle cx="0" cy="0" r="40" fill="none" stroke="#D4AF37" stroke-width="1" />
    <path d="M -80 0 L 80 0 M 0 -80 L 0 80" stroke="#D4AF37" stroke-width="1" />
  </g>

  <!-- Title Block -->
  <g id="title-block" transform="translate(60, 60)">
    <!-- Eyebrow: Category / Context -->
    <text x="0" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="700" fill="#D4AF37" letter-spacing="2.5">
      KERALA TEMPLE FESTIVAL DIGITAL SYSTEM
    </text>

    <!-- Main Title: Pooram Connect -->
    <text x="0" y="80" font-family="Georgia, serif" font-size="56" font-weight="900" fill="#FAF6ED" letter-spacing="1">
      Pooram Connect
    </text>

    <!-- Subtitle / One-Sentence Promise -->
    <text x="0" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#FAF6ED" opacity="0.9">
      <tspan x="0" dy="0">Centralized digital coordination for temple committees,</tspan>
      <tspan x="0" dy="28">elephant owners, and traditional festival vendors.</tspan>
    </text>

    <!-- Description mechanisms -->
    <text x="0" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="#BDAAA0">
      <tspan x="0" dy="0">✓ Strict single-occupancy calendar conflict prevention</tspan>
      <tspan x="0" dy="26">✓ Multi-quantity inventory stock-level reservation controls</tspan>
      <tspan x="0" dy="26">✓ Custom dashboards &amp; SHA-256 session gates</tspan>
    </text>

    <!-- Tech Stack / Architectural Tags -->
    <g id="tech-tags" transform="translate(0, 275)">
      <!-- Tag 1 -->
      <rect x="0" y="0" width="145" height="30" rx="6" fill="#4A0000" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.5" />
      <text x="72.5" y="19" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="bold" fill="#FAF6ED" text-anchor="middle">SPA REGEX ROUTER</text>

      <!-- Tag 2 -->
      <rect x="155" y="0" width="180" height="30" rx="6" fill="#4A0000" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.5" />
      <text x="245" y="19" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="bold" fill="#FAF6ED" text-anchor="middle">RELATIONAL DB EMULATOR</text>

      <!-- Tag 3 -->
      <rect x="345" y="0" width="165" height="30" rx="6" fill="#4A0000" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.5" />
      <text x="427.5" y="19" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="bold" fill="#FAF6ED" text-anchor="middle">VERIFIED SESSION GATE</text>
    </g>
  </g>

  <!-- Project Proof Block (Visualized Dashboard Status) -->
  <g id="project-proof" transform="translate(680, 50)">
    <!-- Dashboard Board Card -->
    <rect width="460" height="280" rx="14" fill="#1A0705" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.7" />

    <!-- Dashboard Title -->
    <text x="25" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="bold" fill="#D4AF37" letter-spacing="1.5">
      REAL-TIME ENGINE PORTAL STATUS
    </text>

    <!-- Traditional Lamp motif in top right corner of the dashboard card -->
    <g transform="translate(425, 25)" stroke="#D4AF37" stroke-width="1.5" fill="none" opacity="0.8">
      <path d="M 0 -10 L 4 -10 C 6 -10 10 -6 10 0 C 10 6 6 10 0 10 C -6 10 -10 6 -10 0 C -10 -6 -6 -10 -4 -10 Z" />
      <path d="M 0 -10 C 2 -14 0 -18 0 -18 C 0 -18 -2 -14 0 -10" fill="#D4AF37" />
    </g>

    <!-- Item 1: Elephant Booking (Karnan) -->
    <g transform="translate(20, 55)">
      <rect width="420" height="64" rx="8" fill="#29120F" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.2" />
      <line x1="1" y1="5" x2="1" y2="59" stroke="#2E7D32" stroke-width="4" stroke-linecap="round" />
      
      <text x="20" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="bold" fill="#FAF6ED">
        Elephant Registry: Karnan
      </text>
      <text x="20" y="46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#BDAAA0">
        Booking: Thrissur Pooram (Medam 30)
      </text>

      <rect x="290" y="17" width="110" height="30" rx="15" fill="#1C3F24" />
      <text x="345" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#FAF6ED" text-anchor="middle">
        ✓ CONFIRMED
      </text>
    </g>

    <!-- Item 2: Accessory Inventory Stock (Muthukuda) -->
    <g transform="translate(20, 130)">
      <rect width="420" height="64" rx="8" fill="#29120F" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.2" />
      <line x1="1" y1="5" x2="1" y2="59" stroke="#D4AF37" stroke-width="4" stroke-linecap="round" />

      <text x="20" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="bold" fill="#FAF6ED">
        Accessory Stock: Muthukuda
      </text>
      <text x="20" y="46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#BDAAA0">
        Inventory Allocation
      </text>

      <text x="250" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#D4AF37">
        90% BOOKED
      </text>
      <rect x="250" y="40" width="150" height="8" rx="4" fill="#42221D" />
      <rect x="250" y="40" width="135" height="8" rx="4" fill="#D4AF37" />
    </g>

    <!-- Item 3: Verification Gate status -->
    <g transform="translate(20, 205)">
      <rect width="420" height="55" rx="8" fill="#29120F" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.2" />
      <line x1="1" y1="5" x2="1" y2="50" stroke="#D4AF37" stroke-width="4" stroke-linecap="round" />

      <text x="20" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="bold" fill="#FAF6ED">
        SHA-256 Administrator Gate
      </text>
      <text x="20" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#BDAAA0">
        Decentralized verification engine active
      </text>

      <circle cx="395" cy="28" r="6" fill="#81C784" />
      <circle cx="395" cy="28" r="10" fill="none" stroke="#81C784" stroke-width="1.5" stroke-opacity="0.5" />
    </g>
  </g>
</svg>
